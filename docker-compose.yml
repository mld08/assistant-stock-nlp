version: '3.8'

services:
  api:
    build: ./backend
    container_name: assistant-stock-backend
    ports:
      - "5000:5000"
    volumes:
      - ./database:/app/database
      - ./backend/uploads:/app/uploads
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: always

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d 
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot
    depends_on:
      - api

  # frontend:
